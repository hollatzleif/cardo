# Deploys apps/website to GitHub Pages of the PUBLIC repo
# (hollatzleif/cardo-app, branch gh-pages) on every website change.
# Needs the same RELEASE_TOKEN secret as release.yml (cross-repo push).
name: Deploy website

# TEMPORARILY manual-only: main already carries the v1.0.0 website texts
# (sync, 47 tools) — they must not go live before the v1.0.0 tag ships.
# Re-enable the push trigger together with the release (run it manually then).
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Build website
        run: pnpm --filter @cardo/website build

      - name: Publish to cardo-app gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.RELEASE_TOKEN }}
          external_repository: hollatzleif/cardo-app
          publish_branch: gh-pages
          publish_dir: apps/website/dist
