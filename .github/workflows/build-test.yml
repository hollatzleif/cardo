# Test builds on demand: produces installers as WORKFLOW ARTIFACTS only.
# Publishes NOTHING — no release, no latest.json, the auto-updater never
# sees these. For trying unreleased builds on another machine (e.g. the
# two-device sync test before a release).
#
# Start it from the Actions tab ("Run workflow"), then download the
# artifact from the run page.
name: Build test installers

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Which installer to build'
        type: choice
        default: windows
        options: [windows, macos, linux, all]

jobs:
  windows:
    if: inputs.platform == 'windows' || inputs.platform == 'all'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: pnpm install --frozen-lockfile
      - name: Build installers (no publish)
        run: pnpm --filter @cardo/desktop tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      - uses: actions/upload-artifact@v4
        with:
          name: cardo-test-windows
          path: |
            target/release/bundle/msi/*.msi
            target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 7

  macos:
    if: inputs.platform == 'macos' || inputs.platform == 'all'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: pnpm install --frozen-lockfile
      - name: Build installers (no publish)
        run: pnpm --filter @cardo/desktop tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          MACOSX_DEPLOYMENT_TARGET: '11.0'
      - uses: actions/upload-artifact@v4
        with:
          name: cardo-test-macos
          path: target/release/bundle/dmg/*.dmg
          if-no-files-found: error
          retention-days: 7

  linux:
    if: inputs.platform == 'linux' || inputs.platform == 'all'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: pnpm install --frozen-lockfile
      - name: Build installers (no publish)
        run: pnpm --filter @cardo/desktop tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      - uses: actions/upload-artifact@v4
        with:
          name: cardo-test-linux
          path: |
            target/release/bundle/appimage/*.AppImage
            target/release/bundle/deb/*.deb
          if-no-files-found: error
          retention-days: 7
